name: Bot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge github_actions updates
        if: |
          steps.metadata.outputs.package-ecosystem == 'github_actions' && (
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-major')
        run: gh pr merge --admin --delete-branch --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}

      - name: Auto-merge patch and minor pip updates
        if: |
          steps.metadata.outputs.package-ecosystem != 'github_actions' && (
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --delete-branch --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-please:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release-please--')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Wait for required checks
        run: |
          echo "Waiting for required checks to complete..."
          while true; do
            CHECK_STATUS=$(gh pr checks "$PR_URL" --json state --jq '.[].state' | grep -v COMPLETED || true)
            if [ -z "$CHECK_STATUS" ]; then
              echo "All checks completed"
              break
            fi
            echo "Waiting for checks: $CHECK_STATUS"
            sleep 10
          done
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Merge release PR
        run: |
          HEAD_SHA=$(gh pr view "$PR_URL" --json headRefOid --jq '.headRefOid')
          gh pr merge "$PR_URL" --admin --squash --delete-branch --match-head-commit "$HEAD_SHA"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-autofix:
    runs-on: ubuntu-latest
    if: |
      contains(github.head_ref, 'alert-autofix') ||
      contains(github.head_ref, 'copilot')
    steps:
      - name: Enable auto-merge for security fixes
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  claude:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/')
    steps:
      - name: Auto-merge Claude AI PRs once checks pass
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
